<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 360px; height: 500px;
      background: #0f0f1a;
      color: #e8e8f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a4a;
    }

    /* 헤더 (드래그 가능) */
    header {
      -webkit-app-region: drag;
      padding: 10px 14px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
    header h1 { font-size: 13px; color: #a78bfa; }
    #close-btn {
      margin-left: auto;
      -webkit-app-region: no-drag;
      background: none; border: none;
      color: #666; cursor: pointer; font-size: 16px;
    }
    #close-btn:hover { color: #ef4444; }

    /* 메시지 */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 12px; display: flex;
      flex-direction: column; gap: 8px;
    }
    .msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1 } }
    .msg.assistant { background: #1e1e3a; border: 1px solid #2a2a5a; align-self: flex-start; border-radius: 3px 10px 10px 10px; }
    .msg.user      { background: #4c1d95; align-self: flex-end; border-radius: 10px 10px 3px 10px; }
    .msg.system    { background: transparent; align-self: center; font-size: 11px; color: #555; font-style: italic; }

    /* 입력 */
    #input-row {
      padding: 10px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      display: flex; gap: 6px; align-items: flex-end;
      flex-shrink: 0;
    }
    #ptt-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid #2a5a3a; background: #1e3a2a;
      color: #4ade80; font-size: 16px; cursor: pointer;
      flex-shrink: 0;
    }
    #ptt-btn.recording { background: #3a1e1e; border-color: #5a2a2a; color: #f87171; animation: pulse 0.5s ease infinite alternate; }
    @keyframes pulse { from{opacity:1} to{opacity:0.5} }
    #text-input {
      flex: 1; background: #0f0f1a;
      border: 1px solid #2a2a4a; border-radius: 8px;
      color: #e8e8f0; padding: 8px 10px;
      font-size: 13px; resize: none;
      outline: none; min-height: 36px; max-height: 90px;
    }
    #text-input:focus { border-color: #7c3aed; }
    #send-btn {
      width: 36px; height: 36px; border-radius: 8px;
      border: none; background: #7c3aed;
      color: white; font-size: 16px; cursor: pointer;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #6d28d9; }

    #stt-hint { padding: 2px 10px; font-size: 11px; color: #555; min-height: 16px; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }

    #toast { position: absolute; bottom: 70px; left: 10px; right: 10px;
      background: #3a1e1e; border: 1px solid #5a2a2a; color: #f87171;
      padding: 8px 12px; border-radius: 8px; font-size: 12px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="dot" id="conn-dot"></div>
  <h1>유키</h1>
  <button id="close-btn">✕</button>
</header>

<div id="messages"></div>
<div id="stt-hint"></div>

<div id="toast"></div>

<div id="input-row">
  <button id="ptt-btn">🎤</button>
  <textarea id="text-input" rows="1" placeholder="유키에게 말해봐... (Enter 전송)"></textarea>
  <button id="send-btn">▶</button>
</div>

<script>
let ws, config
let session = 'default'
let isRecording = false, mediaRecorder, audioChunks = []
let currentMsgEl = null
let muted = false

async function init() {
  config = await window.yukiAPI.getConfig()
  connect()
  window.yukiAPI.onGlobalPttToggle(() => {
    if (isRecording) stopRec(); else startRec()
  })
}

// ─── WebSocket ───────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(config.WS_URL)

  ws.onopen = () => {
    document.getElementById('conn-dot').style.background = '#4caf50'
    addMsg('system', '유키와 연결됐어! 뭐든 물어봐 😊')
  }
  ws.onclose = () => {
    document.getElementById('conn-dot').style.background = '#ef4444'
    setTimeout(connect, 3000)
  }
  ws.onmessage = (e) => handle(JSON.parse(e.data))
}

function send(payload) {
  if (ws?.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ ...payload, session_id: session }))
}

function showToast(msg) {
  const t = document.getElementById('toast')
  if (!t) return
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 5000)
}

// ─── 서버 메시지 처리 ────────────────────────────────────────────
function handle(data) {
  switch (data.type) {
    case 'text_chunk':
      if (!currentMsgEl) currentMsgEl = addMsg('assistant', '')
      currentMsgEl.textContent += data.content
      scrollBottom()
      if (window.yukiAPI.showSpeechBubble)
        window.yukiAPI.showSpeechBubble(currentMsgEl.textContent)
      break

    case 'text_done':
      currentMsgEl = null
      break

    case 'audio_response':
      window.yukiAPI.relayAudio(data.data)
      break

    case 'stt_result':
      document.getElementById('stt-hint').textContent = `인식: "${data.text}"`
      addMsg('user', data.text)
      setTimeout(() => document.getElementById('stt-hint').textContent = '', 3000)
      break

    case 'error':
      showToast(`${data.source || 'error'}: ${data.message}`)
      break

    case 'avatar_emotion':
      if (window.yukiAPI.emitAvatarEmotion)
        window.yukiAPI.emitAvatarEmotion(data)
      break
  }
}

// ─── UI ──────────────────────────────────────────────────────────
function addMsg(role, content) {
  const el = document.createElement('div')
  el.className = `msg ${role}`
  el.textContent = content
  document.getElementById('messages').appendChild(el)
  scrollBottom()
  return el
}
function scrollBottom() {
  const m = document.getElementById('messages')
  m.scrollTop = m.scrollHeight
}

document.getElementById('send-btn').onclick = sendText
document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText() }
})
function sendText() {
  const el = document.getElementById('text-input')
  const text = el.value.trim()
  if (!text) return
  addMsg('user', text)
  send({ type: 'text_message', content: text })
  el.value = ''
}

// ─── PTT 음성 입력 ───────────────────────────────────────────────
const pttBtn = document.getElementById('ptt-btn')
pttBtn.addEventListener('mousedown', startRec)
pttBtn.addEventListener('mouseup', stopRec)

let vadStream, vadCtx, vadAnalyser, vadRaf, vadStartTime = 0
async function startRec() {
  if (isRecording) return
  isRecording = true; audioChunks = []; vadStartTime = Date.now()
  pttBtn.classList.add('recording'); pttBtn.textContent = '⏹'
  vadStream = await navigator.mediaDevices.getUserMedia({ audio: true })
  mediaRecorder = new MediaRecorder(vadStream, { mimeType: 'audio/webm' })
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data) }
  mediaRecorder.start(200)

  vadCtx = new AudioContext()
  const src = vadCtx.createMediaStreamSource(vadStream)
  vadAnalyser = vadCtx.createAnalyser()
  vadAnalyser.fftSize = 512
  src.connect(vadAnalyser)
  const data = new Uint8Array(vadAnalyser.fftSize)
  let silenceStart = 0
  const loop = () => {
    if (!isRecording) return
    vadAnalyser.getByteTimeDomainData(data)
    let sum = 0
    for (let i = 0; i < data.length; i++) { const v = (data[i]-128)/128; sum += v*v }
    const rms = Math.sqrt(sum / data.length)
    const now = Date.now()
    if (rms < 0.02) {
      if (silenceStart === 0) silenceStart = now
      if (now - silenceStart > 800 && now - vadStartTime > 500) { stopRec(); return }
    } else { silenceStart = 0 }
    vadRaf = requestAnimationFrame(loop)
  }
  loop()
}

async function stopRec() {
  if (!isRecording) return
  isRecording = false
  if (vadRaf) cancelAnimationFrame(vadRaf)
  try { vadCtx?.close() } catch {}
  pttBtn.classList.remove('recording'); pttBtn.textContent = '🎤'
  mediaRecorder.stop()
  mediaRecorder.stream.getTracks().forEach(t => t.stop())
  await new Promise(r => mediaRecorder.onstop = r)
  const blob = new Blob(audioChunks, { type: 'audio/webm' })
  const buf = await blob.arrayBuffer()
  const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)))
  send({ type: 'audio_chunk', data: b64, is_final: true })
}

// ─── 오디오 재생 ─────────────────────────────────────────────────
let audioCtx = null
async function playAudio(b64) {
  if (muted) return
  if (!audioCtx) audioCtx = new AudioContext()
  const raw = atob(b64)
  const buf = new Uint8Array(raw.length)
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i)
  const decoded = await audioCtx.decodeAudioData(buf.buffer)
  const src = audioCtx.createBufferSource()
  src.buffer = decoded
  src.connect(audioCtx.destination)
  src.start()
}

document.getElementById('close-btn').onclick = () => window.close()

init()
</script>
</body>
</html>
