<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 400px; height: 600px;
      background: transparent !important;
      overflow: hidden;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    #canvas-wrap {
      position: absolute;
      bottom: 0; left: 0;
      width: 400px; height: 540px;
      cursor: grab;
    }
    #canvas-wrap:active { cursor: grabbing; }
    canvas { display: block; }

    /* 말풍선 */
    #bubble {
      position: absolute;
      top: 10px; left: 10px; right: 10px;
      background: rgba(20, 10, 40, 0.88);
      border: 1px solid rgba(167, 139, 250, 0.6);
      border-radius: 16px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #f0eeff;
      font-family: 'Segoe UI', sans-serif;
      backdrop-filter: blur(8px);
      max-height: 120px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #bubble.visible { opacity: 1; }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: rgba(167, 139, 250, 0.6);
      border-bottom: 0;
    }

    /* 버튼 */
    #controls {
      position: absolute;
      top: 8px; right: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #canvas-wrap:hover ~ #controls,
    #controls:hover { opacity: 1; }

    .ctrl-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(30, 20, 60, 0.8);
      color: #a78bfa;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
    }
    .ctrl-btn:hover { background: rgba(60, 40, 120, 0.9); }

    /* 인라인 채팅 바 */
    #chat-bar {
      position: absolute;
      bottom: 8px; left: 8px; right: 8px;
      display: flex; gap: 4px; align-items: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 20;
    }
    body:hover #chat-bar,
    #chat-bar:focus-within { opacity: 1; pointer-events: auto; }
    #chat-input {
      flex: 1;
      background: rgba(20, 10, 40, 0.92);
      border: 1px solid rgba(167, 139, 250, 0.5);
      border-radius: 14px;
      padding: 7px 12px;
      font-size: 12px;
      color: #f0eeff;
      font-family: 'Segoe UI', sans-serif;
      outline: none;
      backdrop-filter: blur(10px);
    }
    #chat-input::placeholder { color: rgba(240, 238, 255, 0.4); }
    #chat-input:focus { border-color: rgba(167, 139, 250, 0.95); }
    #chat-send {
      width: 30px; height: 30px; border-radius: 50%;
      background: #7c3aed; color: white; border: none;
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #chat-send:hover { background: #6d28d9; }
    #chat-send:disabled { background: #3a2a5a; cursor: default; }
    #ws-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    #ws-dot.ok { background: #4ade80; }

    /* 마이크 레벨 미터 */
    #mic-meter {
      width: 40px; height: 6px; border-radius: 3px;
      background: rgba(20,10,40,0.7);
      overflow: hidden; position: relative;
    }
    #mic-meter-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 0%; background: #4ade80;
      transition: width 0.05s linear, background 0.1s;
    }
    #mic-meter.active #mic-meter-bar { background: #f59e0b; }

    /* 음성 입력 뱃지 (우측 상단) */
    #voice-badge {
      position: fixed;
      top: 8px; right: 8px;
      display: flex; align-items: center; gap: 6px;
      background: rgba(20, 10, 40, 0.92);
      border: 1px solid rgba(167, 139, 250, 0.5);
      border-radius: 14px;
      padding: 5px 10px 5px 8px;
      font-size: 11px; color: #f0eeff;
      font-family: 'Segoe UI', sans-serif;
      backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.2s, transform 0.2s, border-color 0.2s, background 0.2s;
      pointer-events: none;
      z-index: 50;
    }
    #voice-badge.visible { opacity: 1; transform: translateY(0); }
    #voice-badge.recording {
      background: rgba(60, 20, 20, 0.95);
      border-color: #ef4444;
      color: #fca5a5;
    }
    #voice-badge.processing {
      background: rgba(20, 30, 60, 0.95);
      border-color: #60a5fa;
      color: #bfdbfe;
    }
    #voice-badge .vb-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #6b7280;
      flex-shrink: 0;
    }
    #voice-badge.recording .vb-dot {
      background: #ef4444;
      animation: vb-pulse 0.9s infinite;
    }
    #voice-badge.processing .vb-dot {
      background: #60a5fa;
      animation: vb-spin 1s linear infinite;
    }
    @keyframes vb-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }
    @keyframes vb-spin {
      0% { box-shadow: 0 0 0 0 rgba(96,165,250,0.7); }
      100% { box-shadow: 0 0 0 8px rgba(96,165,250,0); }
    }

    /* 디버그 패널 */
    #debug-panel {
      position: fixed;
      top: 0; right: -440px;
      width: 440px; height: 100vh;
      background: #0a0a0a;
      border-left: 1px solid #2a2a2a;
      transition: right 0.25s ease;
      z-index: 1000;
      pointer-events: auto;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }
    #debug-panel.visible { right: 0; }
    #debug-iframe { width: 100%; height: 100%; border: 0; background: #0a0a0a; }
  </style>
</head>
<body>

<div id="bubble"></div>

<div id="voice-badge">
  <span class="vb-dot"></span>
  <span class="vb-text">대기</span>
</div>

<div id="canvas-wrap">
  <canvas id="vrm-canvas" width="400" height="540"></canvas>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-chat" title="채팅 창">💬</button>
  <button class="ctrl-btn" id="btn-mic" title="음성 인식 on/off">🎤</button>
  <button class="ctrl-btn" id="btn-mute" title="음소거">🔊</button>
</div>

<div id="chat-bar">
  <span id="ws-dot" title="연결 상태"></span>
  <div id="mic-meter" title="마이크 레벨 (주황=음성감지)"><div id="mic-meter-bar"></div></div>
  <input id="chat-input" type="text" placeholder="유키에게 말 걸기..." autocomplete="off" />
  <button id="chat-send">▶</button>
</div>

<div id="debug-panel">
  <iframe id="debug-iframe" src="about:blank"></iframe>
</div>

<script type="importmap">
{
  "imports": {
    "three": "../node_modules/three/build/three.module.js",
    "three/": "../node_modules/three/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js'
import { VRMLoaderPlugin, VRMUtils } from '../node_modules/@pixiv/three-vrm/lib/three-vrm.module.js'

// ─── Three.js 씬 (투명 배경) ─────────────────────────────────────
const canvas   = document.getElementById('vrm-canvas')
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true })
renderer.setSize(400, 540)
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setClearColor(0x000000, 0)  // 완전 투명

const scene  = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(30, 400 / 540, 0.1, 20)
camera.position.set(0, 1.4, 3.5)
camera.lookAt(0, 1.2, 0)

// orbit camera state
const orbit = {
  target: new THREE.Vector3(0, 1.2, 0),
  distance: 3.5,
  yaw: 0,
  pitch: 0,
  active: false,
  lastX: 0, lastY: 0,
}
function updateOrbitCamera() {
  const cp = Math.cos(orbit.pitch), sp = Math.sin(orbit.pitch)
  const cy = Math.cos(orbit.yaw),   sy = Math.sin(orbit.yaw)
  camera.position.set(
    orbit.target.x + orbit.distance * sy * cp,
    orbit.target.y + orbit.distance * sp,
    orbit.target.z + orbit.distance * cy * cp,
  )
  camera.lookAt(orbit.target)
}

const ambientLight = new THREE.AmbientLight(0xffffff, 1.2)
const dirLight     = new THREE.DirectionalLight(0xffffff, 0.8)
dirLight.position.set(1, 2, 2)
scene.add(ambientLight, dirLight)

// ─── VRM 로드 ─────────────────────────────────────────────────────
let currentVrm = null
let clock      = new THREE.Clock()
let isTalking  = false
let talkTimer  = 0

// ─── 포즈 프리셋 (단위: 도) — 토끼 모델용 ─────────────────────
// 앞다리 = Arm(humanoid), 뒷다리 = Leg, 귀 = mimi_L/R_01~03, 꼬리 = sita_01~03
const IDLE_POSE = {
  leftUpperArm:  [0, 0, -60],
  rightUpperArm: [0, 0,  60],
  leftLowerArm:  [-5, 0, -8],
  rightLowerArm: [-5, 0,  8],
  leftShoulder:  [0, 0, -5],
  rightShoulder: [0, 0,  5],
  leftHand:  [0, 0, 0],
  rightHand: [0, 0, 0],
  head:  [0, 0, 0],
  neck:  [0, 0, 0],
  spine: [0, 0, 0],
  chest: [0, 0, 0],
  mimi_L_01: [0, 0, 0], mimi_L_02: [0, 0, 0], mimi_L_03: [0, 0, 0],
  mimi_R_01: [0, 0, 0], mimi_R_02: [0, 0, 0], mimi_R_03: [0, 0, 0],
  sita_01: [0, 0, 0], sita_02: [0, 0, 0], sita_03: [0, 0, 0],
}
const POSES = {
  idle: IDLE_POSE,
  perk: { ...IDLE_POSE,       // 귀 쫑긋 (과격)
    mimi_L_01: [-35, 0, -8], mimi_L_02: [-15, 0, 0], mimi_L_03: [-8, 0, 0],
    mimi_R_01: [-35, 0,  8], mimi_R_02: [-15, 0, 0], mimi_R_03: [-8, 0, 0],
    head: [-8, 0, 0],
  },
  droop: { ...IDLE_POSE,      // 귀 축 축 (과격)
    mimi_L_01: [85, 0, -20], mimi_L_02: [40, 0, 0], mimi_L_03: [25, 0, 0],
    mimi_R_01: [85, 0,  20], mimi_R_02: [40, 0, 0], mimi_R_03: [25, 0, 0],
    head: [15, 0, 0], neck: [8, 0, 0],
  },
  tilt: { ...IDLE_POSE,       // 고개 과격 갸웃
    head: [10, -12, 35],
    neck: [0, 0, 15],
    mimi_L_01: [-10, 0, 30], mimi_R_01: [-10, 0, -15],
  },
  wave: { ...IDLE_POSE,       // 앞발 크게 흔들기
    rightUpperArm: [0, 0, 165],
    rightLowerArm: [0, 0, 50],
    rightHand:     [0, 0, 25],
    head:          [0, -18, -5],
    mimi_L_01: [-20, 0, -5], mimi_R_01: [-25, 0,  8],
  },
  think: { ...IDLE_POSE,      // 과장된 고민 (몸 기울임 + 앞발 들기)
    rightUpperArm: [-50, 25, 90],
    rightLowerArm: [-110, 0, 15],
    rightHand:     [0, 0, 0],
    head:          [12, -18, 18],
    neck:          [0, 0, 10],
    spine:         [0, 0, -5],
    mimi_L_01: [25, 0, 0], mimi_R_01: [25, 0, 0],
  },
  cheer: { ...IDLE_POSE,      // 만세 과격 (뒤로 젖히기)
    leftUpperArm:  [0, 0, -175],
    rightUpperArm: [0, 0,  175],
    leftLowerArm:  [-30, 0, 0],
    rightLowerArm: [-30, 0, 0],
    head:          [-20, 0, 0],
    spine:         [-8, 0, 0],
    mimi_L_01: [-30, 0, -8], mimi_R_01: [-30, 0,  8],
  },
  shrug: { ...IDLE_POSE,      // 어깨 과격 들썩
    leftShoulder:  [0, 0, -40],
    rightShoulder: [0, 0,  40],
    leftUpperArm:  [-20, 0, -105],
    rightUpperArm: [-20, 0,  105],
    leftLowerArm:  [-75, 0, -40],
    rightLowerArm: [-75, 0,  40],
    head: [-3, 0, 0],
    mimi_L_01: [30, 0, 0], mimi_R_01: [30, 0, 0],
  },
  point: { ...IDLE_POSE,      // 앞발 크게 지시
    rightShoulder: [0, 0, 15],
    rightUpperArm: [-90, 0, 55],
    rightLowerArm: [0, 0, 0],
    rightHand:     [0, 0, -10],
    head: [0, -25, 0],
    spine: [0, -5, 0],
  },
  nod: { ...IDLE_POSE,        // 크게 끄덕
    head: [32, 0, 0],
    neck: [12, 0, 0],
    mimi_L_01: [15, 0, 0], mimi_R_01: [15, 0, 0],
  },
  bow: { ...IDLE_POSE,        // 큰 절
    spine: [28, 0, 0],
    chest: [15, 0, 0],
    head:  [20, 0, 0],
    mimi_L_01: [40, 0, 0], mimi_R_01: [40, 0, 0],
  },
  wag: { ...IDLE_POSE,        // 꼬리 흔들기 (과격)
    sita_01: [0, 0, 0], sita_02: [0, 0, 0], sita_03: [0, 0, 0],
    mimi_L_01: [-15, 0, -5], mimi_R_01: [-15, 0,  5],
    head: [-5, 0, 0],
  },
}

// 동작 중 oscillate (도달 후 sin 오프셋)
const OSCILLATORS = {
  wave: [
    { bone: 'rightHand',     axis: 2, amp: 30, freq: 5 },
    { bone: 'rightLowerArm', axis: 2, amp: 15, freq: 5, phase: 0.3 },
  ],
  wag:  [
    { bone: 'sita_01', axis: 2, amp: 55, freq: 5 },
    { bone: 'sita_02', axis: 2, amp: 45, freq: 5, phase: 0.5 },
    { bone: 'sita_03', axis: 2, amp: 30, freq: 5, phase: 1.0 },
  ],
  cheer: [
    { bone: 'Hips', axis: 1, amp: 10, freq: 3 },  // Y축 회전 (좌우 흔들)
  ],
  nod: [
    { bone: 'Head', axis: 0, amp: 12, freq: 3 },
  ],
}

const POSE_DURATION_S = 0.45
const POSE_HOLD_S     = 2.5
let poseProgress = 1
let poseStart    = {}
let poseTarget   = {}
let poseHold     = 0
let currentPoseName = 'idle'

function getBone(name) {
  const h = currentVrm?.humanoid
  return h?.getNormalizedBoneNode?.(name)
      || h?.getBoneNode?.(name)
      || currentVrm?.scene?.getObjectByName?.(name)
      || null
}

let activeOscillators = []
let oscStartTime = 0

function applyPoseInstant(name) {
  const pose = POSES[name] || POSES.idle
  for (const [bone, deg] of Object.entries(pose)) {
    const node = getBone(bone)
    if (!node) continue
    node.rotation.set(
      THREE.MathUtils.degToRad(deg[0]),
      THREE.MathUtils.degToRad(deg[1]),
      THREE.MathUtils.degToRad(deg[2]),
    )
  }
  currentPoseName = name
  poseProgress = 1
  poseHold = 0
}

function playAction(name) {
  if (!currentVrm || !POSES[name]) return
  const pose = POSES[name]
  poseStart = {}
  poseTarget = {}
  for (const [bone, deg] of Object.entries(pose)) {
    const node = getBone(bone)
    if (!node) continue
    poseStart[bone] = [node.rotation.x, node.rotation.y, node.rotation.z]
    poseTarget[bone] = [
      THREE.MathUtils.degToRad(deg[0]),
      THREE.MathUtils.degToRad(deg[1]),
      THREE.MathUtils.degToRad(deg[2]),
    ]
  }
  poseProgress = 0
  currentPoseName = name
  poseHold = (name === 'idle') ? 0 : POSE_HOLD_S
  activeOscillators = OSCILLATORS[name] || []
  oscStartTime = clock.elapsedTime
  // wag는 계속 흔들리도록 hold 연장
  if (name === 'wag') poseHold = 4.0
}

function updatePose(delta) {
  if (!currentVrm) return
  if (poseProgress < 1) {
    poseProgress = Math.min(1, poseProgress + delta / POSE_DURATION_S)
    const t = 1 - Math.pow(1 - poseProgress, 3)  // easeOutCubic
    for (const bone in poseTarget) {
      const node = getBone(bone)
      if (!node) continue
      const s = poseStart[bone], e = poseTarget[bone]
      node.rotation.set(
        s[0] + (e[0] - s[0]) * t,
        s[1] + (e[1] - s[1]) * t,
        s[2] + (e[2] - s[2]) * t,
      )
    }
  } else if (activeOscillators.length > 0) {
    const t = clock.elapsedTime - oscStartTime
    for (const osc of activeOscillators) {
      const node = getBone(osc.bone)
      if (!node) continue
      const base = poseTarget[osc.bone] || [0, 0, 0]
      const offset = Math.sin(t * osc.freq * Math.PI * 2 + (osc.phase || 0)) * THREE.MathUtils.degToRad(osc.amp)
      const rot = [base[0], base[1], base[2]]
      rot[osc.axis] = base[osc.axis] + offset
      node.rotation.set(rot[0], rot[1], rot[2])
    }
    if (currentPoseName !== 'idle' && poseHold > 0) {
      poseHold -= delta
      if (poseHold <= 0) playAction('idle')
    }
  } else if (currentPoseName !== 'idle' && poseHold > 0) {
    poseHold -= delta
    if (poseHold <= 0) playAction('idle')
  }
}

// on-screen debug (투명 배경 위 흰 텍스트)
const debugEl = document.createElement('div')
debugEl.style.cssText = 'position:absolute;top:2px;left:2px;color:#0f0;font-size:10px;font-family:monospace;background:rgba(0,0,0,0.5);padding:2px 4px;z-index:99;pointer-events:none;max-width:380px;white-space:pre-wrap'
document.body.appendChild(debugEl)
const dbg = (m) => { debugEl.textContent = m; console.log('[VRM]', m) }

dbg('init: THREE=' + (typeof THREE) + ' GLTF=' + (typeof GLTFLoader) + ' VRMPlugin=' + (typeof VRMLoaderPlugin))

const loader = new GLTFLoader()
loader.register(parser => new VRMLoaderPlugin(parser))

loader.load(
  '../assets/model.vrm',
  (gltf) => {
    try {
      const vrm = gltf.userData.vrm
      if (!vrm) {
        dbg('ERROR: gltf.userData.vrm null — VRMLoaderPlugin 미작동?')
        useCSSAvatar()
        return
      }
      try { VRMUtils.removeUnnecessaryJoints(gltf.scene) } catch (e) { dbg('joints skip: ' + e.message) }
      try { VRMUtils.rotateVRM0(vrm) } catch (e) { /* VRM 1.0 파일이면 필요없음 */ }
      scene.add(vrm.scene)
      currentVrm = vrm
      window.__vrm = vrm  // DevTools inspection

      // ─── 본 인스펙션 덤프 (터미널로 전송) ──────────────────────
      try {
        const humanoid = Object.entries(vrm.humanoid?.humanBones || {})
          .map(([k, b]) => [k, b?.node?.name || null])
        const allBones = []
        vrm.scene.traverse(o => {
          if (o.isBone || o.type === 'Bone') allBones.push(o.name)
        })
        const springCount = vrm.springBoneManager?.joints?.length ?? 0
        const exprArr = vrm.expressionManager?.expressions || []
        const expressions = exprArr.map((e, i) => ({
          i, name: e.expressionName || e.name || null,
          isBinary: e.isBinary, overrideBlink: e.overrideBlink,
        }))
        const exprMap = vrm.expressionManager?.expressionMap || {}
        const exprMapKeys = Object.keys(exprMap)
        const box = new THREE.Box3().setFromObject(vrm.scene)
        const size = box.getSize(new THREE.Vector3())
        window.yukiAPI.logDump('VRM_INSPECT', {
          humanoid, allBones, springCount, expressions, exprMapKeys,
          size: [+size.x.toFixed(3), +size.y.toFixed(3), +size.z.toFixed(3)],
          boneCount: allBones.length,
        })
      } catch (e) { dbg('inspect err: ' + e.message) }

      try { applyPoseInstant('idle') } catch (e) { dbg('pose skip: ' + e.message) }

      // 자동 카메라 프레이밍: 바운딩 박스 계산
      const box = new THREE.Box3().setFromObject(vrm.scene)
      const center = box.getCenter(new THREE.Vector3())
      const size = box.getSize(new THREE.Vector3())
      const maxDim = Math.max(size.x, size.y, size.z)
      // 얼굴·상체만: 모델 top에서 아래로 0.3m 쯤
      const focusY = box.max.y - size.y * 0.15
      orbit.target.set(center.x, focusY, center.z)
      orbit.distance = Math.max(1.5, maxDim * 1.2)
      updateOrbitCamera()

      dbg('OK: size=' + size.x.toFixed(2) + 'x' + size.y.toFixed(2) + 'x' + size.z.toFixed(2) +
          ' center=(' + center.x.toFixed(2) + ',' + center.y.toFixed(2) + ',' + center.z.toFixed(2) + ')')
      setTimeout(() => { debugEl.style.display = 'none' }, 5000)
    } catch (e) {
      dbg('SETUP ERROR: ' + e.message)
      useCSSAvatar()
    }
  },
  (progress) => {
    if (progress.total) dbg('loading ' + Math.round(progress.loaded / progress.total * 100) + '%')
  },
  (error) => {
    dbg('LOAD ERROR: ' + (error?.message || error))
    useCSSAvatar()
  }
)

// ─── CSS 폴백 아바타 ─────────────────────────────────────────────
function useCSSAvatar() {
  canvas.style.display = 'none'
  const el = document.createElement('div')
  el.id = 'css-avatar'
  el.style.cssText = `
    position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
    width:180px; height:260px; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
  `
  el.innerHTML = `
    <div style="font-size:140px; line-height:1; filter:drop-shadow(0 0 20px rgba(167,139,250,0.5))">🧝‍♀️</div>
    <div style="font-size:11px; color:rgba(167,139,250,0.8); letter-spacing:2px; margin-top:4px">YUKI AI</div>
  `
  document.body.appendChild(el)

  // 말할 때 흔들림
  window._talkAnim = (talking) => {
    el.style.animation = talking ? 'talk 0.3s ease infinite alternate' : ''
  }
  const style = document.createElement('style')
  style.textContent = '@keyframes talk { from{transform:translateX(-50%) scale(1)} to{transform:translateX(-50%) scale(1.03)} }'
  document.head.appendChild(style)
}

// ─── 애니메이션 루프 ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate)
  const delta = clock.getDelta()

  if (currentVrm) {
    updatePose(delta)
    // 자연스러운 숨쉬기
    const t = clock.elapsedTime
    if (currentVrm.expressionManager) {
      const breath = Math.sin(t * 1.5) * 0.02
      currentVrm.scene.position.y = breath
    }

    // idle 엉덩이 씰룩 (pose interpolation 완료 + idle 상태일 때만)
    if (currentPoseName === 'idle' && poseProgress >= 1) {
      const hips = getBone('hips')
      if (hips) {
        // 과감한 좌우 트위스트 + 기울기 + 앞뒤 bounce
        const swayY = Math.sin(t * 1.6) * THREE.MathUtils.degToRad(14)
        const swayZ = Math.sin(t * 1.1) * THREE.MathUtils.degToRad(7)
        const swayX = Math.sin(t * 2.2) * THREE.MathUtils.degToRad(3)
        // 5초 주기로 1초간 강한 twist pulse
        const cycle = t % 5
        const pulse = (cycle < 1.0)
          ? Math.sin(cycle * Math.PI) * THREE.MathUtils.degToRad(22)
          : 0
        hips.rotation.set(swayX, swayY + pulse, swayZ)
      }
      // 상체 반대 반응 (머리는 덜 흔들리게)
      const spine = getBone('spine')
      if (spine) {
        spine.rotation.y = Math.sin(t * 1.6) * THREE.MathUtils.degToRad(-5)
        spine.rotation.z = Math.sin(t * 1.1) * THREE.MathUtils.degToRad(-2.5)
      }
      const chest = getBone('chest')
      if (chest) {
        chest.rotation.y = Math.sin(t * 1.6) * THREE.MathUtils.degToRad(-2)
      }
    }

    // 눈 깜빡임 (3~5초마다)
    if (currentVrm.expressionManager) {
      const blinkCycle = Math.floor(t / 4) % 2 === 0
      const blinkTime  = t % 4
      const blink = blinkTime < 0.1 || (blinkTime > 0.15 && blinkTime < 0.25) ? 1 : 0
      currentVrm.expressionManager.setValue('blink', blink)
    }

    // 말하는 입 애니메이션
    if (currentVrm.expressionManager && isTalking) {
      talkTimer += delta
      const aa = Math.abs(Math.sin(talkTimer * 10)) * 0.6
      currentVrm.expressionManager.setValue('aa', aa)
    } else if (currentVrm.expressionManager) {
      currentVrm.expressionManager.setValue('aa', 0)
    }

    currentVrm.update(delta)
  }

  renderer.render(scene, camera)
}
animate()

// ─── 드래그 이동 + 카메라 orbit/pan ─────────────────────────────
let dragStart = null
let panActive = false
let panLastX = 0, panLastY = 0
const wrap = document.getElementById('canvas-wrap')

function panCamera(dxPx, dyPx) {
  // 거리 기반 스케일 — 가까울수록 덜 움직임
  const scale = orbit.distance * 0.002
  const forward = new THREE.Vector3()
  camera.getWorldDirection(forward)
  const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize()
  const up = new THREE.Vector3().crossVectors(right, forward).normalize()
  orbit.target.addScaledVector(right, -dxPx * scale)
  orbit.target.addScaledVector(up,    dyPx * scale)
  updateOrbitCamera()
}

// 우클릭 메뉴 방지
wrap.addEventListener('contextmenu', (e) => e.preventDefault())

wrap.addEventListener('mousedown', (e) => {
  window.yukiAPI.setIgnoreMouse(false)
  // 우클릭 또는 shift+휠 → pan (시점 이동)
  if (e.button === 2 || (e.button === 1 && e.shiftKey)) {
    e.preventDefault()
    panActive = true
    panLastX = e.clientX
    panLastY = e.clientY
  } else if (e.button === 1) {
    // 휠 버튼 → 카메라 orbit (회전)
    e.preventDefault()
    orbit.active = true
    orbit.lastX = e.clientX
    orbit.lastY = e.clientY
  } else if (e.button === 0) {
    // 좌클릭 → 창 이동
    dragStart = { x: e.screenX, y: e.screenY }
  }
})
window.addEventListener('mousemove', (e) => {
  if (panActive) {
    const dx = e.clientX - panLastX
    const dy = e.clientY - panLastY
    panLastX = e.clientX
    panLastY = e.clientY
    panCamera(dx, dy)
    return
  }
  if (orbit.active) {
    const dx = e.clientX - orbit.lastX
    const dy = e.clientY - orbit.lastY
    orbit.lastX = e.clientX
    orbit.lastY = e.clientY
    orbit.yaw   -= dx * 0.01
    orbit.pitch += dy * 0.01
    orbit.pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, orbit.pitch))
    updateOrbitCamera()
    return
  }
  if (!dragStart) return
  const dx = e.screenX - dragStart.x
  const dy = e.screenY - dragStart.y
  window.yukiAPI.moveWindow(dx, dy)
  dragStart = { x: e.screenX, y: e.screenY }
})
window.addEventListener('mouseup', (e) => {
  if (e.button === 2) panActive = false
  if (e.button === 1) { orbit.active = false; panActive = false }
  if (e.button === 0) dragStart = null
})

// 휠 스크롤 → 줌
wrap.addEventListener('wheel', (e) => {
  e.preventDefault()
  const factor = e.deltaY > 0 ? 1.08 : 0.93
  orbit.distance = Math.max(0.5, Math.min(10, orbit.distance * factor))
  updateOrbitCamera()
}, { passive: false })

wrap.addEventListener('mouseenter', () => window.yukiAPI.setIgnoreMouse(false))
wrap.addEventListener('mouseleave', () => {
  if (!dragStart && !orbit.active && !panActive) window.yukiAPI.setIgnoreMouse(true)
})

// ─── 말풍선 ─────────────────────────────────────────────────────
const bubble = document.getElementById('bubble')
let bubbleTimer = null

function showBubble(text) {
  bubble.textContent = text
  bubble.classList.add('visible')
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), 6000)
}

// ─── 오디오 재생 (순차 큐) ───────────────────────────────────────
let muted = false
let audioCtx = null
const audioQueue = []
let audioPlaying = false

async function decodeB64(b64) {
  const raw = atob(b64)
  const buf = new Uint8Array(raw.length)
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i)
  return audioCtx.decodeAudioData(buf.buffer)
}

async function drainAudioQueue() {
  if (audioPlaying) return
  audioPlaying = true
  while (audioQueue.length) {
    const b64 = audioQueue.shift()
    try {
      const decoded = await decodeB64(b64)
      await new Promise((resolve) => {
        const src = audioCtx.createBufferSource()
        src.buffer = decoded
        src.connect(audioCtx.destination)
        src.onended = resolve
        isTalking = true
        if (window._talkAnim) window._talkAnim(true)
        src.start()
      })
    } catch (e) {
      console.warn('[audio] decode/play 실패:', e)
    }
  }
  audioPlaying = false
  isTalking = false
  talkTimer = 0
  if (window._talkAnim) window._talkAnim(false)
  if (listenCtx?.state === 'suspended') {
    listenCtx.resume().then(() => console.log('[VAD] listenCtx resumed (post-TTS)')).catch(()=>{})
  }
  console.log('[VAD] TTS drain done, isTalking=false')
}

function playAudio(b64) {
  if (muted) return
  if (!audioCtx) audioCtx = new AudioContext()
  audioQueue.push(b64)
  drainAudioQueue()
}

// ─── IPC 이벤트 수신 ─────────────────────────────────────────────
window.yukiAPI.onSpeechBubble(showBubble)
window.yukiAPI.onPlayAudio(playAudio)

// ─── 감정 → VRM expression 매핑 ─────────────────────────────────
const EMOTION_VRM = {
  happy: 'happy', worried: 'sad', thinking: 'relaxed',
  surprised: 'angry', idle: 'neutral',  // 이 모델엔 surprised 없음 → angry로 대체
}
function applyEmotion(emotion, intensity) {
  if (!currentVrm?.expressionManager) return
  for (const k of Object.values(EMOTION_VRM)) {
    currentVrm.expressionManager.setValue(k, 0)
  }
  const target = EMOTION_VRM[emotion] || 'neutral'
  if (target !== 'neutral') {
    currentVrm.expressionManager.setValue(target, intensity || 0.7)
  }
}
window.yukiAPI.onAvatarEmotion(({emotion, intensity}) => applyEmotion(emotion, intensity))
window.yukiAPI.onAvatarAction?.(({action}) => playAction(action))

// ─── 디버그 패널 (Alt+D 토글) ────────────────────────────────────
const debugPanel = document.getElementById('debug-panel')

window.yukiAPI.onToggleDebug?.(async () => {

// ─── 인라인 채팅 + WS 직접 연결 ─────────────────────────────────
const chatInput = document.getElementById('chat-input')
const chatSend = document.getElementById('chat-send')
const wsDot = document.getElementById('ws-dot')
const chatBar = document.getElementById('chat-bar')
let ws = null
let streamText = ''

async function connectWS() {
  const cfg = await window.yukiAPI.getConfig()
  ws = new WebSocket(cfg.WS_URL)
  ws.onopen = () => wsDot.classList.add('ok')
  ws.onclose = () => { wsDot.classList.remove('ok'); setTimeout(connectWS, 3000) }
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data)
    switch (d.type) {
      case 'text_chunk':
        streamText += d.content
        showBubble(streamText)
        window.yukiAPI.logDump?.('CHUNK_RX', { content: d.content })
        break
      case 'text_done':
        // 6초 후 자동 페이드. 이미 showBubble setTimeout 처리
        streamText = ''
        break
      case 'audio_response':
        playAudio(d.data)
        break
      case 'avatar_emotion':
        applyEmotion(d.emotion, d.intensity)
        break
      case 'avatar_action':
        window.yukiAPI.logDump?.('ACTION_RX', { action: d.action, ts: Date.now() })
        playAction(d.action)
        break
      case 'stt_result':
        if (d.text) {
          setVoiceBadge('processing', `"${d.text.slice(0, 40)}"`, 4000)
        } else {
          setVoiceBadge(null, '인식 실패', 2500)
        }
        break
      case 'debug_event':
        if (d.stage === 'stt.input') setVoiceBadge('processing', `전송 ${d.payload?.bytes||0}B`)
        else if (d.stage === 'stt.empty') setVoiceBadge(null, '무음', 2500)
        break
    }
  }
}
connectWS()

function sendChat() {
  const text = chatInput.value.trim()
  console.log('[chat] send attempt', {text, wsState: ws?.readyState})
  if (!text) return
  if (ws?.readyState !== WebSocket.OPEN) {
    showBubble('⚠️ 서버 연결 안됨')
    return
  }
  streamText = ''
  ws.send(JSON.stringify({ type: 'text_message', content: text, session_id: 'default' }))
  chatInput.value = ''
  showBubble(`나: ${text}`)
}

chatInput.addEventListener('keydown', (e) => {
  // IME 조합 중 Enter는 무시 (한글 입력 확정용)
  if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
    e.preventDefault()
    sendChat()
  }
})
chatSend.addEventListener('click', sendChat)

// chat bar 영역은 항상 클릭 가능
chatBar.addEventListener('mouseenter', () => window.yukiAPI.setIgnoreMouse(false))
chatBar.addEventListener('mouseleave', () => {
  if (document.activeElement !== chatInput && !dragStart) {
    window.yukiAPI.setIgnoreMouse(true)
  }
})
chatInput.addEventListener('focus', () => window.yukiAPI.setIgnoreMouse(false))
chatInput.addEventListener('blur', () => {

// ─── 컨트롤 버튼 ─────────────────────────────────────────────────
document.getElementById('btn-chat').addEventListener('click', () => window.yukiAPI.toggleChat())

  muted = !muted
  e.currentTarget.textContent = muted ? '🔇' : '🔊'
})

// ─── 상시 음성 인식 (Always Listen) ─────────────────────────────
let listenStream = null
let listenRecorder = null
let listenChunks = []
let listenCtx = null
let listenAnalyser = null
let listenRaf = null
let listenEnabled = false
let hasVoice = false
let voiceMs = 0
let silenceMs = 0
let lastFrameTs = 0

const VAD_THRESHOLD = 0.012
const MIN_VOICE_MS = 150
const SILENCE_END_MS = 800
const VOICE_HANGOVER_MS = 250  // silence 동안 voiceMs 유지 (자음 사이 gap 흡수)

function buildRecorder() {
  const rec = new MediaRecorder(listenStream, { mimeType: 'audio/webm' })
  rec.ondataavailable = (e) => { if (e.data.size > 0) listenChunks.push(e.data) }
  rec.onerror = (e) => console.error('[VAD] recorder error:', e.error)
  rec.onstop = async () => {
    const chunks = listenChunks
    listenChunks = []
    const tracks = listenStream?.getTracks() || []
    const trackStates = tracks.map(t => `${t.kind}:${t.readyState}:${t.muted?'muted':'live'}`).join(',')
    console.log('[VAD] onstop chunks:', chunks.length, 'hasSeg:', hasVoiceSegment, 'enabled:', listenEnabled, 'tracks:', trackStates)
    if (chunks.length > 0 && hasVoiceSegment) {
      const blob = new Blob(chunks, { type: 'audio/webm' })
      const buf = await blob.arrayBuffer()
      const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)))
      if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'audio_chunk', data: b64, is_final: true, session_id: 'default'
        }))
        console.log('[VAD] audio_chunk sent', buf.byteLength, 'bytes')
      } else {
        console.warn('[VAD] WS not open, dropped')
      }
    }
    hasVoiceSegment = false
    if (listenEnabled) {
      try {
        if (listenCtx?.state === 'suspended') {
          await listenCtx.resume()
          console.log('[VAD] listenCtx resumed')
        }
        const liveTrack = tracks.find(t => t.kind === 'audio' && t.readyState === 'live')
        if (!liveTrack) {
          console.warn('[VAD] no live audio track — re-acquiring stream')
          listenStream?.getTracks().forEach(t => t.stop())
          listenStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
          })
        }
        listenRecorder = buildRecorder()
        listenRecorder.start()
        console.log('[VAD] new recorder started, state:', listenRecorder.state)
      } catch (e) {
        console.error('[VAD] recorder restart failed:', e)
        setVoiceBadge(null, '마이크 재시작 실패', 4000)
      }
    }
  }
  return rec
}

let hasVoiceSegment = false
let _vadLastTick = 0
setInterval(() => {
  if (!listenEnabled) return
  const since = performance.now() - _vadLastTick
  if (since > 3000) {
    console.warn('[VAD] watchdog: loop stalled', Math.round(since), 'ms — restarting')
    if (listenRaf) cancelAnimationFrame(listenRaf)
    listenEnabled = false
    stopListen()
    setTimeout(() => startListen().catch(e => console.error('[VAD] restart err:', e)), 500)
  }
}, 2000)

async function startListen() {
  if (listenEnabled) return
  try {
    listenStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    })
    listenEnabled = true
    listenRecorder = buildRecorder()
    listenRecorder.start()

    listenCtx = new AudioContext()
    const src = listenCtx.createMediaStreamSource(listenStream)
    listenAnalyser = listenCtx.createAnalyser()
    listenAnalyser.fftSize = 512
    src.connect(listenAnalyser)
    const data = new Uint8Array(listenAnalyser.fftSize)
    lastFrameTs = performance.now()

    const loop = () => {
      if (!listenEnabled) return
      const now = performance.now()
      const dt = now - lastFrameTs
      lastFrameTs = now
      listenAnalyser.getByteTimeDomainData(data)
      let sum = 0
      for (let i = 0; i < data.length; i++) { const v = (data[i]-128)/128; sum += v*v }
      const rms = Math.sqrt(sum / data.length)

      // TTS 재생 중엔 VAD 상태 리셋 (자기 목소리 되먹임 차단)
      if (isTalking) {
        hasVoice = false; voiceMs = 0; silenceMs = 0
        listenRaf = requestAnimationFrame(loop)
        return
      }

      if (rms >= VAD_THRESHOLD) {
        voiceMs += dt; silenceMs = 0
        if (!hasVoice && voiceMs >= MIN_VOICE_MS) {
          hasVoice = true
          hasVoiceSegment = true
          setVoiceBadge('recording', '듣는 중')
          console.log('[VAD] voice START rms=', rms.toFixed(3), 'recState=', listenRecorder?.state)
        }
      } else {
        silenceMs += dt
        if (silenceMs > VOICE_HANGOVER_MS) voiceMs = 0
        if (hasVoice && silenceMs >= SILENCE_END_MS) {
          hasVoice = false
          silenceMs = 0
          console.log('[VAD] voice END recState=', listenRecorder?.state)
          if (listenRecorder && listenRecorder.state === 'recording') {
            setVoiceBadge('processing', '인식 중...')
            listenRecorder.stop()
          } else {
            console.warn('[VAD] silence end but recorder not recording, state=', listenRecorder?.state)
          }
        }
      }
      updateMicMeter(rms, hasVoice)
      _vadLastTick = performance.now()
      listenRaf = requestAnimationFrame(loop)
    }
    loop()
    updateMicBtn()
    dbg('listen ON')
  } catch (e) {
    dbg('mic err: ' + e.message)
    listenEnabled = false
    updateMicBtn()
  }
}

function stopListen() {
  listenEnabled = false
  if (listenRaf) cancelAnimationFrame(listenRaf)
  try { listenRecorder?.stop() } catch {}
  listenStream?.getTracks().forEach(t => t.stop())
  try { listenCtx?.close() } catch {}
  listenStream = null
  listenRecorder = null
  listenChunks = []
  hasVoice = false; voiceMs = 0; silenceMs = 0
  updateMicBtn()
}

function updateMicBtn() {
  const b = document.getElementById('btn-mic')
  if (b) b.textContent = listenEnabled ? '🎤' : '🔇'
  if (b) b.style.color = listenEnabled ? '#4ade80' : '#a78bfa'
}

const _micMeter = document.getElementById('mic-meter')
const _micBar = document.getElementById('mic-meter-bar')
function updateMicMeter(rms, voiceActive) {
  if (!_micBar) return
  const pct = Math.min(100, Math.round(rms / 0.06 * 100))
  _micBar.style.width = pct + '%'
  _micMeter.classList.toggle('active', voiceActive)
}

const _voiceBadge = document.getElementById('voice-badge')
const _voiceBadgeText = _voiceBadge?.querySelector('.vb-text')
let _voiceBadgeHideTimer = null
function setVoiceBadge(state, text, autoHideMs = 0) {
  if (!_voiceBadge) return
  _voiceBadge.classList.remove('recording', 'processing')
  if (state) _voiceBadge.classList.add(state)
  _voiceBadge.classList.add('visible')
  if (_voiceBadgeText) _voiceBadgeText.textContent = text
  clearTimeout(_voiceBadgeHideTimer)
  if (autoHideMs > 0) {
    _voiceBadgeHideTimer = setTimeout(() => {
      _voiceBadge.classList.remove('visible')
    }, autoHideMs)
  }
}
function hideVoiceBadge() {
  clearTimeout(_voiceBadgeHideTimer)
  _voiceBadge?.classList.remove('visible')
}

document.getElementById('btn-mic').addEventListener('click', () => {
  if (listenEnabled) stopListen()
  else startListen()
})

// 기본 시작: WS 연결 + VRM 로드 완료 후 자동 on
setTimeout(() => { startListen().catch(() => {}) }, 1500)
</script>
