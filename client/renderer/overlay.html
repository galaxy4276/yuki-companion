<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 400px; height: 600px;
      background: transparent !important;
      overflow: hidden;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    #canvas-wrap {
      position: absolute;
      bottom: 0; left: 0;
      width: 400px; height: 540px;
      cursor: grab;
    }
    #canvas-wrap:active { cursor: grabbing; }
    canvas { display: block; }

    /* 말풍선 */
    #bubble {
      position: absolute;
      top: 10px; left: 10px; right: 10px;
      background: rgba(20, 10, 40, 0.88);
      border: 1px solid rgba(167, 139, 250, 0.6);
      border-radius: 16px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #f0eeff;
      font-family: 'Segoe UI', sans-serif;
      backdrop-filter: blur(8px);
      max-height: 120px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #bubble.visible { opacity: 1; }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: rgba(167, 139, 250, 0.6);
      border-bottom: 0;
    }

    /* 버튼 */
    #controls {
      position: absolute;
      top: 8px; right: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #canvas-wrap:hover ~ #controls,
    #controls:hover { opacity: 1; }

    .ctrl-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(30, 20, 60, 0.8);
      color: #a78bfa;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
    }
    .ctrl-btn:hover { background: rgba(60, 40, 120, 0.9); }

    /* 인라인 채팅 바 */
    #chat-bar {
      position: absolute;
      bottom: 8px; left: 8px; right: 8px;
      display: flex; gap: 4px; align-items: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 20;
    }
    body:hover #chat-bar,
    #chat-bar:focus-within { opacity: 1; pointer-events: auto; }
    #chat-input {
      flex: 1;
      background: rgba(20, 10, 40, 0.92);
      border: 1px solid rgba(167, 139, 250, 0.5);
      border-radius: 14px;
      padding: 7px 12px;
      font-size: 12px;
      color: #f0eeff;
      font-family: 'Segoe UI', sans-serif;
      outline: none;
      backdrop-filter: blur(10px);
    }
    #chat-input::placeholder { color: rgba(240, 238, 255, 0.4); }
    #chat-input:focus { border-color: rgba(167, 139, 250, 0.95); }
    #chat-send {
      width: 30px; height: 30px; border-radius: 50%;
      background: #7c3aed; color: white; border: none;
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #chat-send:hover { background: #6d28d9; }
    #chat-send:disabled { background: #3a2a5a; cursor: default; }
    #ws-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    #ws-dot.ok { background: #4ade80; }
  </style>
</head>
<body>

<div id="bubble"></div>

<div id="canvas-wrap">
  <canvas id="vrm-canvas" width="400" height="540"></canvas>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-chat" title="채팅 창">💬</button>
  <button class="ctrl-btn" id="btn-mute" title="음소거">🔊</button>
</div>

<div id="chat-bar">
  <span id="ws-dot" title="연결 상태"></span>
  <input id="chat-input" type="text" placeholder="유키에게 말 걸기..." autocomplete="off" />
  <button id="chat-send">▶</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "../node_modules/three/build/three.module.js",
    "three/": "../node_modules/three/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js'
import { VRMLoaderPlugin, VRMUtils } from '../node_modules/@pixiv/three-vrm/lib/three-vrm.module.js'

// ─── Three.js 씬 (투명 배경) ─────────────────────────────────────
const canvas   = document.getElementById('vrm-canvas')
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true })
renderer.setSize(400, 540)
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setClearColor(0x000000, 0)  // 완전 투명

const scene  = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(30, 400 / 540, 0.1, 20)
camera.position.set(0, 1.4, 3.5)
camera.lookAt(0, 1.2, 0)

const ambientLight = new THREE.AmbientLight(0xffffff, 1.2)
const dirLight     = new THREE.DirectionalLight(0xffffff, 0.8)
dirLight.position.set(1, 2, 2)
scene.add(ambientLight, dirLight)

// ─── VRM 로드 ─────────────────────────────────────────────────────
let currentVrm = null
let clock      = new THREE.Clock()
let isTalking  = false
let talkTimer  = 0

// on-screen debug (투명 배경 위 흰 텍스트)
const debugEl = document.createElement('div')
debugEl.style.cssText = 'position:absolute;top:2px;left:2px;color:#0f0;font-size:10px;font-family:monospace;background:rgba(0,0,0,0.5);padding:2px 4px;z-index:99;pointer-events:none;max-width:380px;white-space:pre-wrap'
document.body.appendChild(debugEl)
const dbg = (m) => { debugEl.textContent = m; console.log('[VRM]', m) }

dbg('init: THREE=' + (typeof THREE) + ' GLTF=' + (typeof GLTFLoader) + ' VRMPlugin=' + (typeof VRMLoaderPlugin))

const loader = new GLTFLoader()
loader.register(parser => new VRMLoaderPlugin(parser))

loader.load(
  '../assets/model.vrm',
  (gltf) => {
    try {
      const vrm = gltf.userData.vrm
      if (!vrm) {
        dbg('ERROR: gltf.userData.vrm null — VRMLoaderPlugin 미작동?')
        useCSSAvatar()
        return
      }
      try { VRMUtils.removeUnnecessaryJoints(gltf.scene) } catch (e) { dbg('joints skip: ' + e.message) }
      try { VRMUtils.rotateVRM0(vrm) } catch (e) { /* VRM 1.0 파일이면 필요없음 */ }
      scene.add(vrm.scene)
      currentVrm = vrm

      // idle 포즈 (팔 내림 + 살짝 굽힘)
      try {
        const h = vrm.humanoid
        const r = (name, x=0, y=0, z=0) => {
          const b = h?.getNormalizedBoneNode?.(name) || h?.getBoneNode?.(name)
          if (b) b.rotation.set(
            THREE.MathUtils.degToRad(x),
            THREE.MathUtils.degToRad(y),
            THREE.MathUtils.degToRad(z),
          )
        }
        r('leftUpperArm',  0, 0, -72)
        r('rightUpperArm', 0, 0,  72)
        r('leftLowerArm',  -5, 0, -8)
        r('rightLowerArm', -5, 0,  8)
        r('leftShoulder',  0, 0, -5)
        r('rightShoulder', 0, 0,  5)
        r('leftHand',  0, 0, -5)
        r('rightHand', 0, 0,  5)
      } catch (e) { dbg('pose skip: ' + e.message) }

      // 자동 카메라 프레이밍: 바운딩 박스 계산
      const box = new THREE.Box3().setFromObject(vrm.scene)
      const center = box.getCenter(new THREE.Vector3())
      const size = box.getSize(new THREE.Vector3())
      const maxDim = Math.max(size.x, size.y, size.z)
      // 얼굴·상체만: 모델 top에서 아래로 0.3m 쯤
      const focusY = box.max.y - size.y * 0.15
      camera.position.set(center.x, focusY, center.z + Math.max(1.5, maxDim * 1.2))
      camera.lookAt(center.x, focusY, center.z)

      dbg('OK: size=' + size.x.toFixed(2) + 'x' + size.y.toFixed(2) + 'x' + size.z.toFixed(2) +
          ' center=(' + center.x.toFixed(2) + ',' + center.y.toFixed(2) + ',' + center.z.toFixed(2) + ')')
      setTimeout(() => { debugEl.style.display = 'none' }, 5000)
    } catch (e) {
      dbg('SETUP ERROR: ' + e.message)
      useCSSAvatar()
    }
  },
  (progress) => {
    if (progress.total) dbg('loading ' + Math.round(progress.loaded / progress.total * 100) + '%')
  },
  (error) => {
    dbg('LOAD ERROR: ' + (error?.message || error))
    useCSSAvatar()
  }
)

// ─── CSS 폴백 아바타 ─────────────────────────────────────────────
function useCSSAvatar() {
  canvas.style.display = 'none'
  const el = document.createElement('div')
  el.id = 'css-avatar'
  el.style.cssText = `
    position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
    width:180px; height:260px; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
  `
  el.innerHTML = `
    <div style="font-size:140px; line-height:1; filter:drop-shadow(0 0 20px rgba(167,139,250,0.5))">🧝‍♀️</div>
    <div style="font-size:11px; color:rgba(167,139,250,0.8); letter-spacing:2px; margin-top:4px">YUKI AI</div>
  `
  document.body.appendChild(el)

  // 말할 때 흔들림
  window._talkAnim = (talking) => {
    el.style.animation = talking ? 'talk 0.3s ease infinite alternate' : ''
  }
  const style = document.createElement('style')
  style.textContent = '@keyframes talk { from{transform:translateX(-50%) scale(1)} to{transform:translateX(-50%) scale(1.03)} }'
  document.head.appendChild(style)
}

// ─── 애니메이션 루프 ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate)
  const delta = clock.getDelta()

  if (currentVrm) {
    // 자연스러운 숨쉬기
    const t = clock.elapsedTime
    if (currentVrm.expressionManager) {
      const breath = Math.sin(t * 1.5) * 0.02
      currentVrm.scene.position.y = breath
    }

    // 눈 깜빡임 (3~5초마다)
    if (currentVrm.expressionManager) {
      const blinkCycle = Math.floor(t / 4) % 2 === 0
      const blinkTime  = t % 4
      const blink = blinkTime < 0.1 || (blinkTime > 0.15 && blinkTime < 0.25) ? 1 : 0
      currentVrm.expressionManager.setValue('blink', blink)
    }

    // 말하는 입 애니메이션
    if (currentVrm.expressionManager && isTalking) {
      talkTimer += delta
      const aa = Math.abs(Math.sin(talkTimer * 10)) * 0.6
      currentVrm.expressionManager.setValue('aa', aa)
    } else if (currentVrm.expressionManager) {
      currentVrm.expressionManager.setValue('aa', 0)
    }

    currentVrm.update(delta)
  }

  renderer.render(scene, camera)
}
animate()

// ─── 드래그 이동 ─────────────────────────────────────────────────
let dragStart = null
const wrap = document.getElementById('canvas-wrap')

wrap.addEventListener('mousedown', (e) => {
  dragStart = { x: e.screenX, y: e.screenY }
  window.yukiAPI.setIgnoreMouse(false)
})
window.addEventListener('mousemove', (e) => {
  if (!dragStart) return
  const dx = e.screenX - dragStart.x
  const dy = e.screenY - dragStart.y
  window.yukiAPI.moveWindow(dx, dy)
  dragStart = { x: e.screenX, y: e.screenY }
})
window.addEventListener('mouseup', () => {
  dragStart = null
})

// 마우스가 캐릭터 영역에 있으면 클릭 통과 해제
wrap.addEventListener('mouseenter', () => window.yukiAPI.setIgnoreMouse(false))
wrap.addEventListener('mouseleave', () => { if (!dragStart) window.yukiAPI.setIgnoreMouse(true) })

// ─── 말풍선 ─────────────────────────────────────────────────────
const bubble = document.getElementById('bubble')
let bubbleTimer = null

function showBubble(text) {
  bubble.textContent = text
  bubble.classList.add('visible')
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => bubble.classList.remove('visible'), 6000)
}

// ─── 오디오 재생 ─────────────────────────────────────────────────
let muted = false
let audioCtx = null

async function playAudio(b64) {
  if (muted) return
  isTalking = true
  if (!audioCtx) audioCtx = new AudioContext()

  const raw = atob(b64)
  const buf = new Uint8Array(raw.length)
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i)

  const decoded = await audioCtx.decodeAudioData(buf.buffer)
  const src = audioCtx.createBufferSource()
  src.buffer = decoded
  src.connect(audioCtx.destination)
  src.start()
  src.onended = () => {
    isTalking = false
    talkTimer = 0
    if (window._talkAnim) window._talkAnim(false)
  }
  if (window._talkAnim) window._talkAnim(true)
}

// ─── IPC 이벤트 수신 ─────────────────────────────────────────────
window.yukiAPI.onSpeechBubble(showBubble)
window.yukiAPI.onPlayAudio(playAudio)

// ─── 감정 → VRM expression 매핑 ─────────────────────────────────
const EMOTION_VRM = {
  happy: 'happy', worried: 'sad', thinking: 'relaxed',
  surprised: 'surprised', idle: 'neutral',
}
function applyEmotion(emotion, intensity) {
  if (!currentVrm?.expressionManager) return
  for (const k of Object.values(EMOTION_VRM)) {
    currentVrm.expressionManager.setValue(k, 0)
  }
  const target = EMOTION_VRM[emotion] || 'neutral'
  if (target !== 'neutral') {
    currentVrm.expressionManager.setValue(target, intensity || 0.7)
  }
}
window.yukiAPI.onAvatarEmotion(({emotion, intensity}) => applyEmotion(emotion, intensity))

// ─── 인라인 채팅 + WS 직접 연결 ─────────────────────────────────
const chatInput = document.getElementById('chat-input')
const chatSend = document.getElementById('chat-send')
const wsDot = document.getElementById('ws-dot')
const chatBar = document.getElementById('chat-bar')
let ws = null
let streamText = ''

async function connectWS() {
  const cfg = await window.yukiAPI.getConfig()
  ws = new WebSocket(cfg.WS_URL)
  ws.onopen = () => wsDot.classList.add('ok')
  ws.onclose = () => { wsDot.classList.remove('ok'); setTimeout(connectWS, 3000) }
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data)
    switch (d.type) {
      case 'text_chunk':
        streamText += d.content
        showBubble(streamText)
        break
      case 'text_done':
        // 6초 후 자동 페이드. 이미 showBubble setTimeout 처리
        streamText = ''
        break
      case 'audio_response':
        playAudio(d.data)
        break
      case 'avatar_emotion':
        applyEmotion(d.emotion, d.intensity)
        break
    }
  }
}
connectWS()

function sendChat() {
  const text = chatInput.value.trim()
  console.log('[chat] send attempt', {text, wsState: ws?.readyState})
  if (!text) return
  if (ws?.readyState !== WebSocket.OPEN) {
    showBubble('⚠️ 서버 연결 안됨')
    return
  }
  streamText = ''
  ws.send(JSON.stringify({ type: 'text_message', content: text, session_id: 'default' }))
  chatInput.value = ''
  showBubble(`나: ${text}`)
}

chatInput.addEventListener('keydown', (e) => {
  // IME 조합 중 Enter는 무시 (한글 입력 확정용)
  if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
    e.preventDefault()
    sendChat()
  }
})
chatSend.addEventListener('click', sendChat)

// chat bar 영역은 항상 클릭 가능
chatBar.addEventListener('mouseenter', () => window.yukiAPI.setIgnoreMouse(false))
chatBar.addEventListener('mouseleave', () => {
  if (document.activeElement !== chatInput && !dragStart) {
    window.yukiAPI.setIgnoreMouse(true)
  }
})
chatInput.addEventListener('focus', () => window.yukiAPI.setIgnoreMouse(false))
chatInput.addEventListener('blur', () => {
  if (!chatBar.matches(':hover')) window.yukiAPI.setIgnoreMouse(true)
})

// ─── 컨트롤 버튼 ─────────────────────────────────────────────────
document.getElementById('btn-chat').addEventListener('click', () => window.yukiAPI.toggleChat())
document.getElementById('btn-mute').addEventListener('click', (e) => {
  muted = !muted
  e.currentTarget.textContent = muted ? '🔇' : '🔊'
})
</script>
</body>
</html>
