<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴끼 — AI 공용 비서</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #e8e8f0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 상단 헤더 */
    header {
      padding: 12px 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    header h1 { font-size: 16px; color: #a78bfa; }
    header .subtitle { font-size: 12px; color: #666; margin-left: auto; }

    /* 메인 레이아웃 */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 아바타 패널 */
    #avatar-panel {
      width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #12122a;
      border-right: 1px solid #2a2a4a;
      padding: 20px;
      gap: 16px;
    }

    #avatar-wrap {
      position: relative;
      width: 200px;
      height: 200px;
    }

    /* CSS 아바타 */
    .avatar {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      position: relative;
      transition: transform 0.3s ease;
      box-shadow: 0 0 40px rgba(167, 139, 250, 0.3);
    }
    .avatar.talking { animation: talking 0.3s ease infinite alternate; }
    .avatar.thinking { animation: floating 1.5s ease infinite; }
    .avatar.happy { animation: bounce 0.5s ease; }
    .avatar.worried { filter: hue-rotate(180deg); }
    .avatar.surprised { animation: shake 0.4s ease; }

    @keyframes talking  { from { transform: scale(1); } to { transform: scale(1.04); } }
    @keyframes floating { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes bounce   { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes shake    { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

    #emotion-label {
      font-size: 12px;
      color: #a78bfa;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #persona-name {
      font-size: 22px;
      font-weight: bold;
      color: #e8e8f0;
    }

    /* 채팅 패널 */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .msg.assistant {
      background: #1e1e3a;
      border: 1px solid #2a2a5a;
      align-self: flex-start;
      border-radius: 4px 12px 12px 12px;
    }
    .msg.user {
      background: #4c1d95;
      align-self: flex-end;
      border-radius: 12px 12px 4px 12px;
    }
    .msg.system {
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      align-self: center;
      font-size: 12px;
      color: #888;
      font-style: italic;
    }

    /* 입력 영역 */
    #input-area {
      padding: 16px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #text-input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 42px;
    }
    #text-input:focus { border-color: #7c3aed; }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    #send-btn {
      background: #7c3aed;
      color: white;
    }
    #send-btn:hover { background: #6d28d9; }

    #ptt-btn {
      background: #1e3a2a;
      color: #4ade80;
      border: 1px solid #2a5a3a;
      min-width: 54px;
    }
    #ptt-btn.recording {
      background: #3a1e1e;
      color: #f87171;
      border-color: #5a2a2a;
      animation: pulse-btn 0.5s ease infinite alternate;
    }
    @keyframes pulse-btn { from { opacity: 1; } to { opacity: 0.6; } }

    /* STT 결과 표시 */
    #stt-preview {
      padding: 6px 14px;
      font-size: 12px;
      color: #888;
      min-height: 20px;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="status-dot" id="conn-dot"></div>
  <h1>뉴끼 AI</h1>
  <span class="subtitle" id="status-text">연결 중...</span>
</header>

<main>
  <div id="avatar-panel">
    <div id="avatar-wrap">
      <div class="avatar" id="avatar">🧝‍♀️</div>
    </div>
    <div id="persona-name">뉴끼</div>
    <div id="emotion-label">idle</div>
  </div>

  <div id="chat-panel">
    <div id="messages"></div>
    <div id="stt-preview"></div>
    <div id="input-area">
      <button class="btn" id="ptt-btn" title="꾹 눌러서 말하기">🎤</button>
      <textarea id="text-input" rows="1" placeholder="뉴끼에게 말하기... (Enter 전송)"></textarea>
      <button class="btn" id="send-btn">전송</button>
    </div>
  </div>
</main>

<script>
const WS_URL = `ws://${location.host}/ws`;
const SESSION_ID = "default";

let ws, mediaRecorder, audioChunks = [], isRecording = false;
let currentMsgEl = null;

// ─── WebSocket ───────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById("conn-dot").style.background = "#4caf50";
    document.getElementById("status-text").textContent = "연결됨";
    addMessage("system", "뉴끼 등장! 뭐든 물어봐 가자!");
  };

  ws.onclose = () => {
    document.getElementById("conn-dot").style.background = "#ef4444";
    document.getElementById("status-text").textContent = "연결 끊김 — 재연결 중...";
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleServer(data);
  };
}

function send(payload) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({...payload, session_id: SESSION_ID}));
}

// ─── 서버 메시지 처리 ────────────────────────────────────
function handleServer(data) {
  switch (data.type) {
    case "text_chunk":
      if (!currentMsgEl) {
        currentMsgEl = addMessage("assistant", "");
      }
      currentMsgEl.textContent += data.content;
      scrollBottom();
      break;

    case "text_done":
      currentMsgEl = null;
      break;

    case "audio_response":
      playAudio(data.data);
      break;

    case "stt_result":
      document.getElementById("stt-preview").textContent = `인식: "${data.text}"`;
      addMessage("user", data.text);
      setTimeout(() => document.getElementById("stt-preview").textContent = "", 3000);
      break;

    case "avatar_emotion":
      setEmotion(data.emotion, data.intensity);
      break;

    case "system_status":
      document.getElementById("status-text").textContent =
        `LLM ✓  TTS ${data.tts_ready?"✓":"✗"}  STT ${data.stt_ready?"✓":"✗"}`;
      break;
  }
}

// ─── 아바타 감정 ─────────────────────────────────────────
const EMOTION_EMOJI = {
  idle: "🧝‍♀️", happy: "😄", thinking: "🤔", worried: "😟", surprised: "😲", talking: "💬"
};

function setEmotion(emotion, intensity) {
  const avatar = document.getElementById("avatar");
  avatar.className = "avatar " + emotion;
  document.getElementById("emotion-label").textContent = emotion;
  if (EMOTION_EMOJI[emotion]) avatar.textContent = EMOTION_EMOJI[emotion];
  setTimeout(() => {
    avatar.classList.remove(emotion);
    avatar.className = "avatar idle";
    document.getElementById("emotion-label").textContent = "idle";
  }, 3000);
}

// ─── 채팅 UI ─────────────────────────────────────────────
function addMessage(role, content) {
  const el = document.createElement("div");
  el.className = `msg ${role}`;
  el.textContent = content;
  document.getElementById("messages").appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

document.getElementById("send-btn").onclick = sendText;
document.getElementById("text-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendText(); }
});

function sendText() {
  const input = document.getElementById("text-input");
  const text = input.value.trim();
  if (!text) return;
  addMessage("user", text);
  send({ type: "text_message", content: text });
  input.value = "";
}

// ─── 음성 입력 (PTT) ─────────────────────────────────────
const pttBtn = document.getElementById("ptt-btn");

pttBtn.addEventListener("mousedown", startRecording);
pttBtn.addEventListener("mouseup", stopRecording);
pttBtn.addEventListener("touchstart", startRecording);
pttBtn.addEventListener("touchend", stopRecording);

async function startRecording() {
  if (isRecording) return;
  isRecording = true;
  audioChunks = [];
  pttBtn.classList.add("recording");
  pttBtn.textContent = "⏹";

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.start(200);
}

async function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  pttBtn.classList.remove("recording");
  pttBtn.textContent = "🎤";

  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());

  await new Promise(r => mediaRecorder.onstop = r);

  const blob = new Blob(audioChunks, { type: "audio/webm" });
  const buf = await blob.arrayBuffer();
  const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
  send({ type: "audio_chunk", data: b64, is_final: true });
}

// ─── 오디오 재생 ─────────────────────────────────────────
async function playAudio(b64) {
  setEmotion("talking", 0.9);
  const avatar = document.getElementById("avatar");
  avatar.classList.add("talking");

  const raw = atob(b64);
  const buf = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);

  const ctx = new AudioContext();
  const decoded = await ctx.decodeAudioData(buf.buffer);
  const src = ctx.createBufferSource();
  src.buffer = decoded;
  src.connect(ctx.destination);
  src.start();
  src.onended = () => {
    avatar.classList.remove("talking");
    ctx.close();
  };
}

connect();
</script>
</body>
</html>
